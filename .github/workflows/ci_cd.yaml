name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'dags/**'
      - 'src/**'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 api/app.py --max-line-length=100 --ignore=E501 || true

      - name: Syntax check DAGs
        run: |
          python -c "import ast; ast.parse(open('dags/data_pipeline.py').read()); print('data_pipeline OK')"
          python -c "import ast; ast.parse(open('dags/training_pipeline.py').read()); print('training_pipeline OK')"
          python -c "import ast; ast.parse(open('dags/monitoring_pipeline.py').read()); print('monitoring_pipeline OK')"

  build-and-push:
    name: Build & Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v4
        with:
          context: ./api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fraud-api:latest
            ${{ secrets.DOCKER_USERNAME }}/fraud-api:${{ github.sha }}

  deploy:
    name: Update K8s Manifest
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update image tag in deployment
        run: |
          sed -i "s|image: fraud-api:local|image: ${{ secrets.DOCKER_USERNAME }}/fraud-api:${{ github.sha }}|g" k8s/deployment.yaml
          echo "Updated deployment.yaml:"
          grep "image:" k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}" || echo "No changes"
          git push